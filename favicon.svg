<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Two interlocking wedding rings">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBD27A"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B5860C"/>
    </linearGradient>
    <!-- area around the upper crossing where the left ring passes OVER the right -->
    <clipPath id="topCross"><rect x="24" y="13" width="18" height="15"/></clipPath>
    <!-- hides the right ring exactly where the left ring overlaps it at the top -->
    <mask id="weave">
      <rect width="64" height="64" fill="#fff"/>
      <g clip-path="url(#topCross)">
        <circle cx="23" cy="33" r="14" fill="none" stroke="#000" stroke-width="8.2"/>
      </g>
    </mask>
  </defs>

  <!-- left ring -->
  <circle cx="23" cy="33" r="14" fill="none" stroke="#8A6B1C" stroke-width="6.6"/>
  <circle cx="23" cy="33" r="14" fill="none" stroke="url(#gold)" stroke-width="5"/>

  <!-- right ring, woven under the left ring at the top crossing -->
  <g mask="url(#weave)">
    <circle cx="41" cy="33" r="14" fill="none" stroke="#8A6B1C" stroke-width="6.6"/>
    <circle cx="41" cy="33" r="14" fill="none" stroke="url(#gold)" stroke-width="5"/>
  </g>
</svg>
